name: Update CSV Only (No AI)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  update-csv:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests python-dotenv

      - name: Create directories
        run: |
          mkdir -p data
          mkdir -p reports

      - name: Fetch and append new data to CSV
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python scripts/fetch_yields.py

      - name: Commit and push CSV changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/yield_history.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Update CSV only $(date +'%Y-%m-%d')"
          git push

name: Daily Yield Curve Report

on:
  schedule:
    # Run at 8:00 AM UTC every Monday-Friday (after US market close)
    - cron: '0 8 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create directories
      run: |
        mkdir -p data
        mkdir -p reports
        
    - name: Run yield report
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        python scripts/daily_yield_report.py
        
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/ reports/
        git diff --quiet && git diff --staged --quiet || git commit -m "Daily yield report $(date +'%Y-%m-%d')"
        git push
